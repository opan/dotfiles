# ==========================================
# 1. Colors & Terminal Compatibility
# ==========================================
# Modern Tmux uses 'tmux-256color' instead of 'screen-256color' for better features
set -g default-terminal "tmux-256color"

# Support true colors (RGB) inside modern terminal emulators
set-option -as terminal-features ",xterm-256color:RGB"

# ==========================================
# 2. General Preferences & Fixes
# ==========================================
# Allow copy-mode just by clicking and dragging
set -g mouse on

# Set maximum history limit
set-option -g history-limit 10000

# Fix Neovim ESC delay. Un-commented and changed to recommended server option (-s)
set -s escape-time 10

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Ensure layout numbers re-index seamlessly if a window is closed
set -g renumber-windows on

# ==========================================
# 3. Vim-Style Navigation
# ==========================================
# Set copy mode to use Vi keys
setw -g mode-keys vi

# Navigate panes using h, j, k, l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Cycle through windows using Ctrl+h and Ctrl+l
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# ==========================================
# 4. Copy-Paste (Mac Architecture Optimized)
# ==========================================
# Standardized Vi selection keys
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
